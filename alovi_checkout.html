<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Beveiligd afrekenen bij Alovi.">
  <title>Afrekenen | Alovi</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --cream: #f4f2ed;
      --cream-light: #f9f7f3;
      --black: #1a1a18;
      --text-muted: #6a6a64;
      --sage-warm: #8a9478;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'Inter', -apple-system, sans-serif;
      --transition-base: 400ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      color: var(--black);
      background: var(--cream);
      line-height: 1.75;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .page-header {
      padding: 100px 32px 40px;
      text-align: center;
      background: var(--cream);
    }

    .page-title {
      font-family: var(--font-serif);
      font-size: clamp(28px, 4vw, 36px);
      font-weight: 400;
      margin-bottom: 8px;
    }

    .checkout-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 32px 80px;
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 48px;
    }

    .checkout-form {
      background: white;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    }

    .form-section {
      margin-bottom: 32px;
    }

    .form-section-title {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--cream);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e8e6e1;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 14px;
      transition: border-color 250ms;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--sage-warm);
    }

    .order-summary {
      background: white;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
      height: fit-content;
      position: sticky;
      top: 120px;
    }

    .order-summary-title {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 20px;
    }

    .order-item {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--cream);
    }

    .order-item-image {
      width: 60px;
      height: 60px;
      background: var(--cream-light);
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .order-item-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .order-item-details {
      flex: 1;
    }

    .order-item-name {
      font-size: 13px;
      font-weight: 400;
      margin-bottom: 4px;
    }

    .order-item-quantity {
      font-size: 12px;
      color: var(--text-muted);
    }

    .order-item-price {
      font-size: 14px;
      font-weight: 500;
      color: var(--sage-warm);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .summary-row.total {
      border-top: 1px solid var(--cream);
      padding-top: 16px;
      margin-top: 16px;
      font-size: 16px;
      font-weight: 500;
    }

    .btn-place-order {
      display: block;
      width: 100%;
      padding: 18px 32px;
      background: var(--sage-warm);
      color: white;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      margin-top: 24px;
      transition: all var(--transition-base);
    }

    .btn-place-order:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(138, 148, 120, 0.25);
    }

    .payment-methods {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      justify-content: center;
    }

    .payment-icon {
      font-size: 24px;
      opacity: 0.5;
    }

    .trust-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 16px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--sage-warm);
    }

    @media (max-width: 1024px) {
      .checkout-container {
        grid-template-columns: 1fr;
      }

      .order-summary {
        position: static;
      }
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .page-header {
        padding: 80px 20px 30px;
      }

      .checkout-container {
        padding: 0 20px 60px;
      }
    }
  </style>
</head>
<body>
  <header class="page-header">
    <a href="alovi_cart.html" class="back-link">← Terug naar winkelwagen</a>
    <h1 class="page-title">Afrekenen</h1>
  </header>

  <div class="checkout-container">
    <form class="checkout-form" id="checkoutForm" onsubmit="handleCheckout(event)">
      <div class="form-section">
        <h2 class="form-section-title">Contactgegevens</h2>
        <div class="form-grid">
          <div class="form-group full-width">
            <label for="email">E-mailadres *</label>
            <input type="email" id="email" required placeholder="jouw@email.nl">
          </div>
          <div class="form-group">
            <label for="phone">Telefoonnummer</label>
            <input type="tel" id="phone" placeholder="+31 6 12345678">
          </div>
        </div>
      </div>

      <div class="form-section">
        <h2 class="form-section-title">Verzendadres</h2>
        <div class="form-grid">
          <div class="form-group">
            <label for="firstName">Voornaam *</label>
            <input type="text" id="firstName" required placeholder="Jouw voornaam">
          </div>
          <div class="form-group">
            <label for="lastName">Achternaam *</label>
            <input type="text" id="lastName" required placeholder="Jouw achternaam">
          </div>
          <div class="form-group full-width">
            <label for="address">Straat en huisnummer *</label>
            <input type="text" id="address" required placeholder="Voorbeeldstraat 123">
          </div>
          <div class="form-group">
            <label for="postcode">Postcode *</label>
            <input type="text" id="postcode" required placeholder="1234 AB">
          </div>
          <div class="form-group">
            <label for="city">Plaats *</label>
            <input type="text" id="city" required placeholder="Amsterdam">
          </div>
          <div class="form-group full-width">
            <label for="country">Land *</label>
            <select id="country" required>
              <option value="NL">Nederland</option>
              <option value="BE">België</option>
              <option value="DE">Duitsland</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-section">
        <h2 class="form-section-title">Betaling</h2>
        <div class="form-group">
          <label for="cardName">Naam op kaart *</label>
          <input type="text" id="cardName" required placeholder="J VOORNAAM A ACHTERNAAM">
        </div>
        <div class="form-group">
          <label for="cardNumber">Kaartnummer *</label>
          <input type="text" id="cardNumber" required placeholder="1234 5678 9012 3456" maxlength="19">
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label for="cardExpiry">Vervaldatum *</label>
            <input type="text" id="cardExpiry" required placeholder="MM / JJ" maxlength="7">
          </div>
          <div class="form-group">
            <label for="cardCvc">CVC/CVV *</label>
            <input type="text" id="cardCvc" required placeholder="123" maxlength="4">
          </div>
        </div>
      </div>

      <button type="submit" class="btn-place-order">Bestelling plaatsen</button>
    </form>

    <div class="order-summary">
      <h2 class="order-summary-title">Besteloverzicht</h2>
      <div id="orderItems"></div>

      <div class="summary-row">
        <span>Subtotaal</span>
        <span id="subtotal">€0,00</span>
      </div>
      <div class="summary-row">
        <span>Verzending</span>
        <span id="shipping">€0,00</span>
      </div>
      <div class="summary-row total">
        <span>Totaal</span>
        <span id="total">€0,00</span>
      </div>

      <div class="payment-methods">
        <span class="payment-icon">💳</span>
        <span class="payment-icon">🔒</span>
      </div>

      <div class="trust-badge">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Beveiligde SSL-betaling
      </div>
    </div>
  </div>

  <script>
    let cart = JSON.parse(localStorage.getItem('aloviCart')) || [];

    function formatPrice(price) {
      return '€' + price.toFixed(2).replace('.', ',');
    }

    function renderOrderSummary() {
      const orderItemsContainer = document.getElementById('orderItems');
      const subtotalEl = document.getElementById('subtotal');
      const shippingEl = document.getElementById('shipping');
      const totalEl = document.getElementById('total');

      if (cart.length === 0) {
        window.location.href = 'alovi_cart.html';
        return;
      }

      orderItemsContainer.innerHTML = cart.map(item => `
        <div class="order-item">
          <div class="order-item-image">
            <img src="https://images.unsplash.com/photo-1611930022073-b7a4ba5fcccd?w=100&h=100&fit=crop" alt="${item.name}">
          </div>
          <div class="order-item-details">
            <p class="order-item-name">${item.name}</p>
            <p class="order-item-quantity">Aantal: ${item.quantity}</p>
          </div>
          <p class="order-item-price">${formatPrice(item.price * item.quantity)}</p>
        </div>
      `).join('');

      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const shipping = subtotal >= 60 ? 0 : 5.95;
      const total = subtotal + shipping;

      subtotalEl.textContent = formatPrice(subtotal);
      shippingEl.textContent = shipping === 0 ? 'Gratis' : formatPrice(shipping);
      totalEl.textContent = formatPrice(total);
    }

    function handleCheckout(event) {
      event.preventDefault();

      // Generate order number
      const orderNumber = 'ALO-' + Date.now().toString(36).toUpperCase();

      // Store order info
      const orderInfo = {
        orderNumber,
        items: cart,
        date: new Date().toISOString(),
        total: cart.reduce((sum, item) => sum + (item.price * item.quantity), 0)
      };

      sessionStorage.setItem('lastOrder', JSON.stringify(orderInfo));

      // Clear cart
      localStorage.removeItem('aloviCart');

      // Redirect to success page
      window.location.href = 'alovi_order-success.html';
    }

    // Format card number input
    document.getElementById('cardNumber').addEventListener('input', function(e) {
      let value = e.target.value.replace(/\s/g, '').replace(/\D/g, '');
      let formattedValue = value.match(/.{1,4}/g)?.join(' ') || value;
      e.target.value = formattedValue;
    });

    // Format expiry date input
    document.getElementById('cardExpiry').addEventListener('input', function(e) {
      let value = e.target.value.replace(/\s/g, '').replace(/\D/g, '');
      if (value.length >= 2) {
        value = value.substring(0, 2) + ' / ' + value.substring(2);
      }
      e.target.value = value;
    });

    renderOrderSummary();
  </script>
</body>
</html>
